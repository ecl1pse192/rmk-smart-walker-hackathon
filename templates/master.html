<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд мастера смены</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-live {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45); }
            50% { opacity: 0.9; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }
        .live-dot {
            animation: pulse-live 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-dvh bg-slate-900 text-slate-100 antialiased">
    <div class="mx-auto flex min-h-dvh w-full max-w-6xl flex-col px-6 py-8">
        <header class="mb-8 flex flex-wrap items-center justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-white">Панель управления мастера смены</h1>
                <p class="mt-1 text-sm text-slate-400">Показания в реальном времени (обновление каждые 3 с)</p>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex items-center gap-2 rounded-full border border-emerald-800/60 bg-emerald-950/40 px-4 py-2">
                    <span class="live-dot h-2.5 w-2.5 shrink-0 rounded-full bg-emerald-500" aria-hidden="true"></span>
                    <span class="text-sm font-semibold text-emerald-400">Live</span>
                </div>
                <span id="last-poll-label" class="text-xs text-slate-500">—</span>
            </div>
        </header>

        <main class="flex flex-1 flex-col">
            <div id="readings-error" class="mb-4 hidden rounded-xl border border-rose-900/50 bg-rose-950/40 px-4 py-3 text-sm text-rose-200 ring-1 ring-rose-800/40"></div>

            <div class="overflow-hidden rounded-2xl border border-slate-700/80 bg-slate-800/40 shadow-xl ring-1 ring-white/5">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[640px] border-collapse text-left text-sm">
                        <thead>
                            <tr class="border-b border-slate-700 bg-slate-800/80">
                                <th scope="col" class="px-4 py-3 font-semibold text-slate-300" title="Момент последнего успешного опроса (в ответе API нет времени записи)">Время</th>
                                <th scope="col" class="px-4 py-3 font-semibold text-slate-300">Оборудование</th>
                                <th scope="col" class="px-4 py-3 font-semibold text-slate-300">Значение</th>
                                <th scope="col" class="px-4 py-3 font-semibold text-slate-300">Статус</th>
                            </tr>
                        </thead>
                        <tbody id="readings-tbody" class="divide-y divide-slate-700/80">
                            <tr>
                                <td colspan="4" class="px-4 py-10 text-center text-slate-500">Загрузка показаний…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const tbody = document.getElementById('readings-tbody');
        const errorEl = document.getElementById('readings-error');
        const lastPollLabel = document.getElementById('last-poll-label');

        const normalizeList = (data) => {
            if (Array.isArray(data)) return data;
            if (data && Array.isArray(data.results)) return data.results;
            return [];
        };

        const escapeHtml = (s) =>
            String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');

        const buildEquipmentMap = (items) => {
            const map = new Map();
            for (const eq of items) {
                if (eq && eq.id) map.set(String(eq.id), eq);
            }
            return map;
        };

        const equipmentLabel = (eqId, equipmentMap) => {
            const eq = equipmentMap.get(String(eqId));
            if (!eq) return escapeHtml(String(eqId).slice(0, 8)) + '…';
            const name = eq.name || '';
            const shop = eq.shop ? ` (${eq.shop})` : '';
            return escapeHtml(name) + escapeHtml(shop);
        };

        const iconCheck = `<span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-emerald-600/20 text-emerald-400" title="В норме">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M20 7L10.5 16.5 4 10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>`;

        const iconWarn = `<span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-rose-600/30 text-rose-300" title="Вне нормы">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 9v4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 17h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                <path d="M10.3 4.5h3.4L21 18.5H3L10.3 4.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
        </span>`;

        const renderRows = (readings, equipmentMap, timeLabel) => {
            if (!readings.length) {
                tbody.innerHTML =
                    '<tr><td colspan="4" class="px-4 py-10 text-center text-slate-500">Нет показаний</td></tr>';
                return;
            }

            const timeCell = escapeHtml(timeLabel);

            tbody.innerHTML = readings
                .map((r) => {
                    const bad = r.is_out_of_norm === true;
                    const rowClass = bad
                        ? 'bg-rose-900/50 hover:bg-rose-900/60'
                        : 'bg-slate-800/30 hover:bg-slate-800/50';
                    const valueStr = r.value != null ? String(r.value) : '—';
                    const statusHtml = bad
                        ? `<span class="inline-flex items-center gap-2 font-medium text-rose-300">${iconWarn} Вне нормы</span>`
                        : `<span class="inline-flex items-center gap-2 font-medium text-emerald-300">${iconCheck} В норме</span>`;

                    return `
                        <tr class="${rowClass} transition-colors">
                            <td class="whitespace-nowrap px-4 py-3 tabular-nums text-slate-400">${timeCell}</td>
                            <td class="px-4 py-3 font-medium text-slate-100">${equipmentLabel(r.equipment, equipmentMap)}</td>
                            <td class="px-4 py-3 font-mono text-slate-200">${escapeHtml(valueStr)}</td>
                            <td class="px-4 py-3">${statusHtml}</td>
                        </tr>`;
                })
                .join('');
        };

        async function fetchReadings() {
            try {
                errorEl.classList.add('hidden');
                const [readingsRes, equipmentRes] = await Promise.all([
                    fetch('/api/readings/', { credentials: 'same-origin' }),
                    fetch('/api/equipment/', { credentials: 'same-origin' }),
                ]);

                if (!readingsRes.ok) {
                    throw new Error(`Показания: HTTP ${readingsRes.status}`);
                }
                if (!equipmentRes.ok) {
                    throw new Error(`Оборудование: HTTP ${equipmentRes.status}`);
                }

                const readingsData = await readingsRes.json();
                const equipmentData = await equipmentRes.json();
                const readings = normalizeList(readingsData);
                const equipmentMap = buildEquipmentMap(normalizeList(equipmentData));

                const now = new Date();
                const timeLabel = now.toLocaleString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                });
                lastPollLabel.textContent = 'Обновлено: ' + timeLabel;
                renderRows(readings, equipmentMap, timeLabel);
            } catch (err) {
                errorEl.textContent =
                    err && err.message ? err.message : 'Не удалось загрузить данные';
                errorEl.classList.remove('hidden');
                tbody.innerHTML =
                    '<tr><td colspan="4" class="px-4 py-10 text-center text-rose-300/90">Ошибка загрузки. Повторяем…</td></tr>';
            }
        }

        fetchReadings();
        setInterval(fetchReadings, 3000);
    </script>
</body>
</html>
