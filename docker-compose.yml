services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: energy_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d energy_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: .
      network: host
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_DB: energy_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DJANGO_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_volume: